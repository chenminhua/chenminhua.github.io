  <h2 class="subtitle is-size-4-mobile is-size-3-desktop">Belief_system</h1>
  <div class="content">
    <p>《Primal Branding》</p>

<p>在 Primal Branding 理论中，Hanlon 提到，所有的信仰体系（Belief System）可以被拆解为 7 个关键点。这 7 个关键点分别是 Creation Story（创始故事）、Creed（信条）、Icons(标识）、Rituals（仪式/行为）、Lexicon/Sacred Words（暗号）、Non-Believers（不信你的人/黑粉）Leader（领袖）。它们之间相辅相成，但没有主次之分。</p>
