<!doctype html><html lang=en-us><head><meta charset=utf-8><meta http-equiv=X-UA-Compatible content="IE=edge"><meta name=viewport content="width=device-width,initial-scale=1"><meta name=description content="要想在篮球场上抢到更多的篮板，有两个天赋很重要，一个是身高（或者垂直摸高），一个是弹跳。
篮球届有一个名言：You can’t teach height，身高这玩意儿纯看天赋，后天努力对结果的影响很小。而弹跳相对而言则是可以被训练的，你可以在很多地方找到练弹跳的方法。
显然，这里有两种能力，一种是trainable 的，另一种则纯看天吃饭。或者说这里有一个光谱。
那么，数学天赋在这个光谱的哪一端呢？语言天赋又在哪一端呢?方向感又在哪一端呢？到底哪些是可以后天努力的，哪些能力如果你天生没有后天也弥补不太上了？"><title>两种能力</title><link rel=stylesheet href=/css/main.51652302d3a998bf7887aed5c2cf89141bbebdf45a2c8f87b0717a3cf4f51c4e53c694c328fb1de78c3a625a1c01f80745bf1f2f42c040647a245cbbb6c2d1d7.css integrity="sha512-UWUjAtOpmL94h67Vws+JFBu+vfRaLI+HsHF6PPT1HE5TxpTDKPsd54w6YlocAfgHRb8fL0LAQGR6JFy7tsLR1w=="></head><body a=auto><main class=page-content aria-label=Content><div class=w><div class=post-meta><a href=/>← home</a></div><article><h1>两种能力</h1><p>要想在篮球场上抢到更多的篮板，有两个天赋很重要，一个是身高（或者垂直摸高），一个是弹跳。</p><p>篮球届有一个名言：You can’t teach height，身高这玩意儿纯看天赋，后天努力对结果的影响很小。而弹跳相对而言则是可以被训练的，你可以在很多地方找到练弹跳的方法。</p><p>显然，这里有两种能力，一种是trainable 的，另一种则纯看天吃饭。或者说这里有一个光谱。</p><p>那么，数学天赋在这个光谱的哪一端呢？语言天赋又在哪一端呢?方向感又在哪一端呢？到底哪些是可以后天努力的，哪些能力如果你天生没有后天也弥补不太上了？</p></article></div></main></body></html>
